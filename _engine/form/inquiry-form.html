<!--
  문의폼 스니펫 — 페이지의 문의 섹션에 복붙해서 사용.
  · data-endpoint 를 고객 Apps Script 웹앱 URL 로 교체 (셋업: ./README.md)
  · 같은 폴더의 inquiry-form.css / inquiry-form.js 를 페이지에 로드
  · 업종별 커스텀 항목은 <input name="..."> 추가만 하면 자동으로 시트 '기타' 칼럼에 적재됨
-->
<form class="inq" data-inquiry data-endpoint="PUT_APPS_SCRIPT_WEBAPP_URL_HERE" novalidate>
  <div class="inq__row">
    <label class="inq__field">
      <span class="inq__label">이름 *</span>
      <input class="inq__input" type="text" name="name" required autocomplete="name" />
    </label>
    <label class="inq__field">
      <span class="inq__label">연락처 *</span>
      <input class="inq__input" type="tel" name="phone" required autocomplete="tel" placeholder="010-0000-0000" />
    </label>
  </div>

  <label class="inq__field">
    <span class="inq__label">이메일</span>
    <input class="inq__input" type="email" name="email" autocomplete="email" />
  </label>

  <label class="inq__field">
    <span class="inq__label">문의 내용 *</span>
    <textarea class="inq__input inq__textarea" name="message" rows="5" required></textarea>
  </label>

  <!-- 허니팟: 사람은 못 보고 봇만 채우는 함정 필드 → 서버에서 무시 -->
  <input class="inq__hp" type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" />

  <button class="inq__submit" type="submit">문의 보내기</button>
  <p class="inq__status" data-form-status role="status" aria-live="polite"></p>
</form>
