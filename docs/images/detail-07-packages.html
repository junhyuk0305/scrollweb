<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="image.css">
<style>
.d7 .common{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:50px}
.d7 .ci{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:20px 24px;font-size:17px;font-weight:600}
.d7 .ci .v{flex:none;width:30px;height:30px;border-radius:8px;background:var(--accent-soft);
  border:1px solid var(--accent-line);color:var(--accent);display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:15px}
.d7 .common-title{font-size:18px;font-weight:700;color:var(--ink-dim);margin-top:54px;margin-bottom:6px}
</style></head>
<body>
<div class="canvas d7">
  <div class="brand brand-mark"><span class="glyph">S</span><span>SCROLL<span class="dim">WORKS</span></span></div>
  <span class="sec-tag">07 / 09</span>
  <div class="pad-lg">
    <span class="eyebrow">Packages</span>
    <h2 class="title">필요한 만큼, <em>패키지</em>로 선택하세요</h2>

    <table class="ptable">
      <thead><tr>
        <th></th>
        <th>기본형<span class="sub">원페이지</span></th>
        <th class="hot"><span class="badge">추천</span>표준형<span class="sub">메인+서브</span></th>
        <th>풀 인터랙티브<span class="sub">최대 5p</span></th>
      </tr></thead>
      <tbody>
        <tr><th>구성</th><td>4~6섹션</td><td class="hot">8~10섹션</td><td>12~15섹션</td></tr>
        <tr><th>스크롤 인터랙션</th><td>기본</td><td class="hot">시그니처 1종</td><td>맞춤 2종</td></tr>
        <tr><th>반응형 웹</th><td><span class="yes">●</span></td><td class="hot"><span class="yes">●</span></td><td><span class="yes">●</span></td></tr>
        <tr><th>문의 폼</th><td><span class="no">–</span></td><td class="hot"><span class="yes">●</span></td><td><span class="yes">●</span></td></tr>
        <tr><th>후기 슬라이드 · 지도</th><td><span class="no">–</span></td><td class="hot"><span class="yes">●</span></td><td><span class="yes">●</span></td></tr>
        <tr><th>이미지 시퀀스 · 마스크 · 로딩</th><td><span class="no">–</span></td><td class="hot"><span class="no">–</span></td><td><span class="yes">●</span></td></tr>
      </tbody>
    </table>

    <div class="common-title">모든 패키지 공통 제공</div>
    <div class="common">
      <div class="ci"><span class="v">✓</span>반응형(모바일·태블릿·PC)</div>
      <div class="ci"><span class="v">✓</span>기본 SEO (메타 · OG 태그)</div>
      <div class="ci"><span class="v">✓</span>고정 CTA (상담·전화·카톡 버튼)</div>
      <div class="ci"><span class="v">✓</span>소스 코드 + 구조 주석 납품</div>
    </div>
  </div>
</div>
</body></html>
