<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="image.css">
<style>
.d3 .ba{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:28px;margin-top:54px}
.d3 .ba .lab{font-size:14px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin-bottom:14px;text-align:center}
.d3 .arrow{font-size:40px;color:var(--accent)}
.d3 .old .device{filter:grayscale(1) brightness(.7);opacity:.65}
.d3 .old .ui-accent{background:#555}
.d3 .values{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:64px}
.d3 .val{text-align:center}
.d3 .val .ic{margin:0 auto 18px}
.d3 .val h3{font-size:22px;font-weight:700;margin-bottom:8px}
.d3 .val p{font-size:15px;color:var(--ink-faint)}
</style></head>
<body>
<div class="canvas d3">
  <div class="brand brand-mark"><span class="glyph">S</span><span>SCROLL<span class="dim">WORKS</span></span></div>
  <span class="sec-tag">03 / 09</span>
  <div class="pad-lg">
    <span class="eyebrow">Solution</span>
    <h2 class="title">그래서, <em>이렇게</em> 만듭니다</h2>
    <p class="lead">스크롤에 반응하는 프리미엄 인터랙티브 홈페이지로 바꿉니다.</p>

    <div class="ba">
      <div class="old">
        <div class="lab">BEFORE</div>
        <div class="device"><div class="bar"><i></i><i></i><i></i></div>
          <div class="screen"><div class="ui-hero" style="height:60px"></div>
          <div class="ui-accent"></div><div class="ui-line w70"></div><div class="ui-line w50"></div></div></div>
      </div>
      <div class="arrow">→</div>
      <div class="new">
        <div class="lab" style="color:var(--accent)">AFTER</div>
        <div class="device motion-ghost"><div class="bar"><i></i><i></i><i></i></div>
          <div class="screen"><div class="streak" style="top:40%"></div>
          <div class="ui-hero" style="height:78px"></div>
          <div class="ui-accent"></div><div class="ui-line w85"></div>
          <div class="ui-grid"><div></div><div></div></div></div></div>
      </div>
    </div>

    <div class="values">
      <div class="val"><div class="ic">⟳</div><h3>스크롤 인터랙션</h3><p>스크롤에 반응하는 움직임</p></div>
      <div class="val"><div class="ic">▦</div><h3>반응형·모바일</h3><p>PC·태블릿·모바일 대응</p></div>
      <div class="val"><div class="ic">⚡</div><h3>빠른 납기</h3><p>검증된 스택으로 신속 제작</p></div>
    </div>
  </div>
</div>
</body></html>
