<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="image.css">
<style>
.d6 .devices{display:flex;align-items:flex-end;justify-content:center;gap:28px;margin:60px 0 50px}
.d6 .desktop{width:520px}
.d6 .desktop .screen{min-height:240px;padding:26px}
.d6 .tablet{width:230px;border-radius:18px;border:6px solid #1a1d24;background:#0a0b0e;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.5)}
.d6 .tablet .screen{padding:16px;min-height:300px}
.d6 .phone .screen{min-height:260px}
.d6 .chips{justify-content:center}
</style></head>
<body>
<div class="canvas d6">
  <div class="brand brand-mark"><span class="glyph">S</span><span>SCROLL<span class="dim">WORKS</span></span></div>
  <span class="sec-tag">06 / 09</span>
  <div class="pad-lg" style="text-align:center">
    <span class="eyebrow" style="display:inline-flex">Point 3 · 반응형</span>
    <h2 class="title">PC에서 본 그 움직임,<br><em>모바일</em>에서도 그대로</h2>

    <div class="devices">
      <div class="tablet"><div class="screen">
        <div class="ui-hero" style="height:70px"></div><div class="ui-accent"></div>
        <div class="ui-line w85"></div><div class="ui-line w50"></div></div></div>

      <div class="device desktop motion-ghost"><div class="bar"><i></i><i></i><i></i></div>
        <div class="screen"><div class="streak" style="top:42%"></div>
        <div class="ui-hero" style="height:90px"></div><div class="ui-accent"></div>
        <div class="ui-line w85"></div><div class="ui-grid"><div></div><div></div></div></div></div>

      <div class="phone"><div class="screen">
        <div class="ui-hero" style="height:48px"></div><div class="ui-accent" style="width:60%"></div>
        <div class="ui-line w85"></div><div class="ui-line w50"></div></div></div>
    </div>

    <div class="chips">
      <span class="chip on">모바일 · 태블릿 · PC 반응형</span>
      <span class="chip">스크롤 효과 모바일 최적화</span>
      <span class="chip">60fps 목표</span>
      <span class="chip">저사양·접근성 환경 자동 경량화</span>
    </div>
  </div>
</div>
</body></html>
