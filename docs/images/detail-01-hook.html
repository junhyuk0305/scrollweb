<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="image.css">
<style>
.d1{min-height:1600px;display:flex;flex-direction:column;justify-content:center}
.d1 .pad{padding-top:0;padding-bottom:0}
.d1 h1.title{font-size:72px}
.d1 .hero-device{margin-top:64px;display:flex;justify-content:center}
.d1 .device{width:680px}
.d1 .device .screen{min-height:300px;padding:40px}
.d1 .arrow-down{position:absolute;bottom:60px;left:50%;transform:translateX(-50%)}
</style></head>
<body>
<div class="canvas d1">
  <div class="brand brand-mark"><span class="glyph">S</span><span>SCROLL<span class="dim">WORKS</span></span></div>
  <span class="sec-tag">01 / 09</span>
  <div class="pad">
    <span class="eyebrow">Interactive Website</span>
    <h1 class="title">스크롤을 내리면<br><em>살아나는</em> 홈페이지</h1>
    <p class="lead">정지된 화면이 아니라, 스크롤에 반응해 움직이는<br>인터랙티브 홈페이지를 만듭니다.</p>

    <div class="hero-device">
      <div class="device motion-ghost">
        <div class="bar"><i></i><i></i><i></i></div>
        <div class="screen">
          <div class="streak" style="top:30%"></div>
          <div class="streak" style="top:62%;opacity:.35"></div>
          <div class="ui-hero" style="height:120px"></div>
          <div class="ui-accent"></div>
          <div class="ui-line w85"></div>
          <div class="ui-line w50"></div>
          <div class="ui-grid"><div></div><div></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="arrow-down"><span>SCROLL</span><span class="a">↓</span></div>
</div>
</body></html>
