<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="image.css">
<style>
.d2 .pains{display:grid;gap:20px;margin-top:48px}
.d2 .closing{margin-top:54px;font-family:var(--serif);font-size:30px;font-weight:600;color:var(--ink-dim);line-height:1.5}
.d2 .closing em{font-style:normal;color:var(--accent)}
</style></head>
<body>
<div class="canvas d2">
  <div class="brand brand-mark"><span class="glyph">S</span><span>SCROLL<span class="dim">WORKS</span></span></div>
  <span class="sec-tag">02 / 09</span>
  <div class="pad-lg">
    <span class="eyebrow">Problem</span>
    <h2 class="title">혹시, 이런 홈페이지인가요?</h2>

    <div class="pains">
      <div class="pain"><span class="x">✕</span><span>몇 년째 그대로인 오래된 디자인</span></div>
      <div class="pain"><span class="x">✕</span><span>모바일에서 레이아웃이 깨진다</span></div>
      <div class="pain"><span class="x">✕</span><span>네이버 플레이스·블로그에만 의존하고 있다</span></div>
      <div class="pain"><span class="x">✕</span><span>어디서 본 듯한 평범한 템플릿</span></div>
    </div>

    <p class="closing">방문자는 첫 화면에서 머물지,<br><em>떠날지</em>를 결정합니다.</p>
  </div>
</div>
</body></html>
